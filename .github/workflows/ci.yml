name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  # Static analysis across all Go services. Runs in parallel with unit so
  # feedback comes in ~30s either way, and one doesn't block the other.
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: |
            services/sink/go.sum
            services/transformer/go.sum
            services/loadgen/go.sum

      - name: golangci-lint - sink
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9
        with:
          version: latest
          working-directory: services/sink
          args: --config=${{ github.workspace }}/.golangci.yml

      - name: golangci-lint - transformer
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9
        with:
          version: latest
          working-directory: services/transformer
          args: --config=${{ github.workspace }}/.golangci.yml

      - name: golangci-lint - loadgen
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9
        with:
          version: latest
          working-directory: services/loadgen
          args: --config=${{ github.workspace }}/.golangci.yml

  # Trivy scans Dockerfiles for misconfigurations (root user, missing
  # HEALTHCHECK, :latest base images, …) and the filesystem for known
  # CVEs in pinned dependencies. HIGH+CRITICAL fail the build.
  trivy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: trivy - Dockerfile misconfig scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: '1'
          hide-progress: true

      - name: trivy - dependency CVE scan (sink)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: fs
          scan-ref: services/sink
          severity: HIGH,CRITICAL
          exit-code: '1'
          hide-progress: true
          ignore-unfixed: true

      - name: trivy - dependency CVE scan (transformer)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: fs
          scan-ref: services/transformer
          severity: HIGH,CRITICAL
          exit-code: '1'
          hide-progress: true
          ignore-unfixed: true

      - name: trivy - dependency CVE scan (loadgen)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: fs
          scan-ref: services/loadgen
          severity: HIGH,CRITICAL
          exit-code: '1'
          hide-progress: true
          ignore-unfixed: true

  # Go source security scan across all services. gosec catches the subset
  # of security-relevant bugs (weak crypto, unsafe SQL, open files without
  # close, etc.) that a generic lint does not flag. Using the binary
  # directly instead of the securego/gosec@master action - the latter has
  # been flaky and the binary is trivially installable.
  gosec:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26'

      - name: install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: gosec - sink
        working-directory: services/sink
        run: gosec -fmt=text ./...

      - name: gosec - transformer
        working-directory: services/transformer
        run: gosec -fmt=text ./...

      - name: gosec - loadgen
        working-directory: services/loadgen
        run: gosec -fmt=text ./...

  # Fast feedback: go test + vet + build for both services, plus shell-syntax
  # check and compose-config validation. Should finish in ~60s.
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: |
            services/sink/go.sum
            services/transformer/go.sum
            services/loadgen/go.sum

      - name: sink - test, vet, build
        working-directory: services/sink
        run: |
          go test ./...
          go vet ./...
          go build ./...

      - name: transformer - test, vet, build
        working-directory: services/transformer
        run: |
          go test ./...
          go vet ./...
          go build ./...

      - name: loadgen - test, vet, build
        working-directory: services/loadgen
        run: |
          go test ./...
          go vet ./...
          go build ./...

      - name: bash scripts - syntax check
        run: |
          set -e
          for f in scripts/*.sh chaos/*.sh chaos/scenarios/*.sh; do
            bash -n "$f"
          done
          echo "all scripts parse"

      - name: JSON configs - validity
        run: |
          for f in connectors/*.json observability/**/*.json; do
            [ -f "$f" ] && node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))" && echo "OK $f"
          done

      - name: docker compose - validate all overlays
        run: |
          docker compose -f docker-compose.yml config --quiet
          docker compose -f docker-compose.yml -f docker-compose.chaos.yml config --quiet
          docker compose -f docker-compose.yml -f docker-compose.chaos.yml -f docker-compose.toxiproxy.yml config --quiet
          POSTGRES_PASSWORD=ci docker compose -f docker-compose.prod.yml config --quiet

      - name: helm - lint and template the chart
        run: |
          curl -fsSL https://get.helm.sh/helm-v3.16.4-linux-amd64.tar.gz | tar -xz
          ./linux-amd64/helm lint deploy/helm/pg2mongo-cdc
          ./linux-amd64/helm template ci-test deploy/helm/pg2mongo-cdc \
            --namespace pg2mongo-cdc \
            > /tmp/rendered.yaml
          # Sanity: rendered output is non-empty and parses as YAML.
          test -s /tmp/rendered.yaml
          docker run --rm -v /tmp:/work mikefarah/yq:latest \
            'true' /work/rendered.yaml > /dev/null

      - name: "chaos scripts - every scenario carries a PASS criterion"
        run: |
          set -e
          for s in chaos/scenarios/*.sh; do
            if ! grep -q '^# PASS:' "$s"; then
              echo "FAIL: $s missing PASS: comment" && exit 1
            fi
          done
          echo "all scenarios carry a PASS: criterion"

  # Hit a real Mongo (GitHub service container) for the LSN-gating proof.
  # Fast: ~15s once Go deps cache warm.
  integration-mongo:
    runs-on: ubuntu-latest
    needs: unit
    timeout-minutes: 10
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: services/sink/go.sum

      - name: run LSN-gate integration test
        working-directory: services/sink
        env:
          MONGO_URI: mongodb://localhost:27017/?directConnection=true
        run: go test -tags integration -v -run TestMongoWriter_LSNGate ./internal/writer/...

  # Boot the full stack, register Debezium, seed, verify PG↔Mongo counts
  # match end-to-end. Skips the chaos suite (it needs ~5 min and is better
  # run manually on PR-labels until the runner-cost profile is known).
  integration-stack:
    runs-on: ubuntu-latest
    needs: unit
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: prepare env
        run: cp .env.example .env

      - name: bring up core stack
        run: docker compose up -d --build --wait

      - name: register Debezium source
        run: bash scripts/register-connectors.sh

      - name: seed + verify integrity
        run: |
          sleep 15
          bash scripts/seed.sh
          bash chaos/verify-integrity.sh

      - name: logs on failure
        if: failure()
        run: |
          docker compose ps
          docker compose logs --tail=200

      - name: teardown
        if: always()
        run: docker compose down -v
