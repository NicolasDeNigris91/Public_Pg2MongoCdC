name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Mondays 03:17 UTC - off-peak, avoids the dependabot 09:00 burst.
    - cron: '17 3 * * 1'

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        language: [go, actions]

    steps:
      - uses: actions/checkout@v4

      - if: matrix.language == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: |
            services/sink/go.sum
            services/transformer/go.sum
            services/loadgen/go.sum

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      # autobuild fails on multi-module Go repos; build each module explicitly.
      - if: matrix.language == 'go'
        name: Build all Go services
        run: |
          set -e
          for svc in services/sink services/transformer services/loadgen; do
            (cd "$svc" && go build ./...)
          done

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
