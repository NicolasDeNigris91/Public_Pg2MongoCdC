# Local dev stack. Laptop-simplified:
#   - 1 Kafka broker (KRaft); prod uses 3 brokers, RF=3, min.insync.replicas=2.
#   - 1-node Mongo replica set; prod uses a 3-node set.
# See docker-compose.prod.yml for the production reference topology.

name: zdt-migration

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:

  # ------------------------------------------------------------------
  # Source: PostgreSQL 16 with logical replication enabled
  # ------------------------------------------------------------------
  postgres:
    image: postgres:16
    container_name: zdt-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_replication_slots=10"
      - "-c"
      - "max_wal_senders=10"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./schema/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-app}"]
      interval: 5s
      timeout: 3s
      retries: 10
    logging: *default-logging

  # ------------------------------------------------------------------
  # Kafka (KRaft, single combined node - dev only)
  # ------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: zdt-kafka
    restart: unless-stopped
    environment:
      # KRaft combined mode (controller + broker in one process)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      # PROXIED is a dedicated listener advertised as toxiproxy:19092 so that
      # clients bootstrapping via toxiproxy:19092 get metadata pointing back
      # there - every subsequent request also flows through the proxy.
      # Harmless when Toxiproxy is not up; clients simply never bootstrap
      # via this listener.
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,INTERNAL://0.0.0.0:29092,PROXIED://0.0.0.0:39092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092,INTERNAL://kafka:29092,PROXIED://toxiproxy:19092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,PROXIED:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # KRaft requires a cluster ID (base64-encoded UUID, 22 chars)
      CLUSTER_ID: "MkU3OEVBNTcwNTJFNEY3Mg"
    ports:
      - "${KAFKA_EXTERNAL_PORT:-9092}:9092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    logging: *default-logging

  # ------------------------------------------------------------------
  # Schema Registry (Avro compat enforcement)
  # ------------------------------------------------------------------
  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.1
    container_name: zdt-schema-registry
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: "http://0.0.0.0:8081"
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: "PLAINTEXT://kafka:29092"
      SCHEMA_REGISTRY_SCHEMA_COMPATIBILITY_LEVEL: "BACKWARD"
    ports:
      - "${SCHEMA_REGISTRY_PORT:-8081}:8081"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/subjects >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging: *default-logging

  # ------------------------------------------------------------------
  # Kafka Connect with Debezium (source) + MongoDB Kafka Connector (sink)
  # ------------------------------------------------------------------
  connect:
    build:
      context: ./connectors/connect-image
    container_name: zdt-connect
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      BOOTSTRAP_SERVERS: "kafka:29092"
      GROUP_ID: ${CONNECT_GROUP_ID:-zdt-connect}
      CONFIG_STORAGE_TOPIC: ${CONNECT_CONFIG_STORAGE_TOPIC:-_connect_configs}
      OFFSET_STORAGE_TOPIC: ${CONNECT_OFFSET_STORAGE_TOPIC:-_connect_offsets}
      STATUS_STORAGE_TOPIC: ${CONNECT_STATUS_STORAGE_TOPIC:-_connect_status}
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      # JsonConverter for the dev stack; Avro + Schema Registry is a config flip.
      KEY_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      VALUE_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "true"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "true"
      # Heartbeat topic so Postgres doesn't recycle WAL during low traffic.
      REST_ADVERTISED_HOST_NAME: connect
      REST_PORT: ${CONNECT_REST_PORT:-8083}
      PLUGIN_PATH: "/kafka/connect"
    ports:
      - "${CONNECT_REST_PORT:-8083}:8083"
    volumes:
      - connect-data:/kafka/connect-runtime-data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8083/connectors >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    logging: *default-logging

  # ------------------------------------------------------------------
  # MongoDB 7 - single-node replica set (dev simplification)
  # ------------------------------------------------------------------
  mongo:
    image: mongo:7
    container_name: zdt-mongo
    restart: unless-stopped
    command: ["mongod", "--replSet", "${MONGO_REPLICA_SET:-rs0}", "--bind_ip_all", "--port", "27017"]
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      # Healthy once replica set is initialized (mongo-init runs once)
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand({ ping: 1 }).ok' | grep -q 1"]
      interval: 5s
      timeout: 3s
      retries: 20
    logging: *default-logging

  # ------------------------------------------------------------------
  # transformer: reads cdc.*, applies YAML rename rules from
  # schema/transforms/, publishes transformed.*.
  # ------------------------------------------------------------------
  transformer:
    build:
      context: ./services/transformer
    container_name: zdt-transformer
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: "kafka:29092"
      KAFKA_GROUP_ID: "zdt-transformer"
      KAFKA_TOPIC_REGEX: "^cdc\\..*"
      RULES_DIR: "/etc/transformer/rules"
      METRICS_ADDR: ":8080"
    volumes:
      - ./schema/transforms:/etc/transformer/rules:ro
    ports:
      - "8087:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging: *default-logging

  # ------------------------------------------------------------------
  # sink: Go service. Consumes transformed.*, batches BulkWrite into Mongo
  # with LSN-gated upserts. Commits offsets only after the write succeeds.
  # ------------------------------------------------------------------
  sink:
    build:
      context: ./services/sink
    container_name: zdt-sink
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      mongo:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BROKERS: "kafka:29092"
      KAFKA_GROUP_ID: "zdt-sink"
      KAFKA_TOPIC_REGEX: "^transformed\\..*"
      MONGO_URI: "mongodb://mongo:27017/?replicaSet=rs0"
      MONGO_DB: "migration"
      METRICS_ADDR: ":8080"
      SCHEMA_VERSION: "1"
    ports:
      - "8085:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging: *default-logging

  # ------------------------------------------------------------------
  # loadgen sidecar: translates k6 HTTP calls into Postgres writes.
  # ------------------------------------------------------------------
  loadgen:
    build:
      context: ./services/loadgen
    container_name: zdt-loadgen
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PG_URI: "postgres://app:app@postgres:5432/app?sslmode=disable"
      ADDR: ":8080"
    ports:
      - "8086:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging: *default-logging

  # One-shot: initialize the single-node replica set. Exits after success.
  mongo-init:
    image: mongo:7
    container_name: zdt-mongo-init
    depends_on:
      mongo:
        condition: service_healthy
    restart: "no"
    entrypoint:
      - bash
      - -c
      - |
        set -euo pipefail
        echo "Waiting for mongod..."
        until mongosh --host mongo:27017 --quiet --eval 'db.adminCommand({ping:1}).ok' | grep -q 1; do sleep 1; done
        STATE=$$(mongosh --host mongo:27017 --quiet --eval 'try { rs.status().ok } catch(e) { 0 }')
        if [ "$$STATE" = "1" ]; then
          echo "Replica set already initialized."
          exit 0
        fi
        echo "Initiating replica set ${MONGO_REPLICA_SET:-rs0}..."
        mongosh --host mongo:27017 --quiet --eval 'rs.initiate({_id: "rs0", members: [{_id: 0, host: "mongo:27017"}]})'
        echo "Done."
    logging: *default-logging

volumes:
  pg-data:
  kafka-data:
  mongo-data:
  connect-data:
