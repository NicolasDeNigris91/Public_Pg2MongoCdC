groups:
  - name: zdt-migration
    interval: 30s
    rules:

      - alert: ReplicationLagHigh
        expr: histogram_quantile(0.99, sum(rate(migration_replication_lag_seconds_bucket[5m])) by (le)) > 10
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "Replication lag p99 > 10s for 5m"
          description: "Consumers are falling behind. Check consumer CPU, Mongo write latency, Kafka broker health."
          runbook: "docs/runbook.md#replicationlaghigh"

      - alert: ConsumerLagHigh
        # Prefer the sink-emitted gauge (always present in any deployment)
        # and fall back to kafka-exporter's gauge (only present when the
        # chaos overlay is up). `or` here returns the first vector with
        # samples, so this stays correct in either topology.
        expr: (migration_consumer_group_lag or sum(kafka_consumergroup_lag) by (consumergroup)) > 10000
        for: 2m
        labels: { severity: warning }
        annotations:
          summary: "Consumer group lag > 10k for 2m"
          runbook: "docs/runbook.md#consumerlaghigh"

      - alert: ConsumerLagProbeStale
        expr: migration_consumer_group_lag_age_seconds > 300
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "Sink-side lag probe stale for >5m"
          description: "Sink cannot describe its own consumer group via Kafka admin. Investigate broker auth/connectivity from the sink pod."
          runbook: "docs/runbook.md#consumerlagprobestale"

      - alert: DLQNonEmpty
        expr: sum(kafka_topic_partition_current_offset{topic=~"dlq\\..*"} - kafka_topic_partition_oldest_offset{topic=~"dlq\\..*"}) > 0
        for: 1m
        labels: { severity: critical }
        annotations:
          summary: "Dead-letter queue has unprocessed messages"
          description: "At least one poison event is sitting in a DLQ. Human triage required."
          runbook: "docs/runbook.md#dlqnonempty"

      - alert: CheckpointStaleness
        expr: migration_checkpoint_staleness_seconds > 60
        for: 2m
        labels: { severity: warning }
        annotations:
          summary: "Sink checkpoint has not advanced in >60s"
          runbook: "docs/runbook.md#checkpointstaleness"

      - alert: WriteErrorRateHigh
        expr: sum(rate(migration_write_errors_total[5m])) / sum(rate(migration_events_processed_total{stage="sink"}[5m])) > 0.001
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "Sink write error rate > 0.1% for 5m"
          runbook: "docs/runbook.md#writeerrorratehigh"

      - alert: SinkApplyStuck
        expr: max(migration_consecutive_apply_failures) > 5
        for: 2m
        labels: { severity: critical }
        annotations:
          summary: "Sink has failed >5 consecutive ApplyBatch calls"
          description: "Sink is in exponential backoff; downstream (Mongo) is unreachable or rejecting writes. ConsumerLagHigh will follow if this persists."
          runbook: "docs/runbook.md#sinkapplystuck"

      - alert: ReplicationSlotInactive
        expr: pg_replication_slots_active == 0
        for: 2m
        labels: { severity: critical }
        annotations:
          summary: "Postgres replication slot is inactive"
          description: "Debezium is not connected to the slot. WAL will accumulate. If this persists, the source DB runs out of disk."
          runbook: "docs/runbook.md#replicationslotinactive"
