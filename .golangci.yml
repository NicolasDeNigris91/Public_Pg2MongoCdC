# golangci-lint configuration (v2 format)
#
# Philosophy:
#   - Default to the "staticcheck" family because it catches real bugs,
#     not style preferences.
#   - errcheck + errorlint because unchecked or unwrapped errors in CDC
#     code paths is where silent data loss comes from.
#   - bodyclose + noctx because the sink and transformer speak HTTP to
#     Mongo and Kafka - resource leaks on the hot path are production
#     incidents, not style quibbles.
#   - Disable purely stylistic linters - too noisy relative to value.
#
# Run locally:
#   docker run --rm -v "$PWD:/app" -w /app/services/sink \
#     golangci/golangci-lint:latest-alpine golangci-lint run --config=/app/.golangci.yml

version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - bodyclose
    - noctx
    - errorlint
    - gocritic
    - revive
    - unconvert
    - unparam
    # CDC-pipeline-specific bar:
    - prealloc    # hot-path slice growth = GC pressure during burst load
    - errname     # ErrFoo / FooError convention for sentinels (e.g. ErrTombstone)
    - forbidigo   # block fmt.Println/Print in services - everything goes through log
  settings:
    errcheck:
      # Ignore deferred Close() - best-effort at teardown, nothing
      # useful to do if it fails.
      exclude-functions:
        - (io.Closer).Close
        - (*database/sql.Tx).Rollback
        - (*database/sql.DB).Close
    govet:
      enable:
        - shadow
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
      disabled-checks:
        # Too noisy on intentional small branches.
        - ifElseChain
    forbidigo:
      forbid:
        - pattern: '^fmt\.Print(ln|f)?$'
          msg: "use log (or t.Logf in tests) so output is structured + filterable"
  exclusions:
    rules:
      # Test files are deliberately simpler: httptest.NewRequest without
      # context, string literals repeated for readability, assertions
      # that ignore error returns. Apply production rigor to production
      # code; keep tests legible.
      - path: _test\.go
        linters:
          - errcheck
          - unparam
          - gocritic
          - noctx
          - revive
          - forbidigo  # tests print to t.Logf via t.Helper - fmt is fine in test helpers
      # CLI tools legitimately write to stdout via fmt.Print* - that IS the
      # contract. Long-running services must use the structured logger.
      - path: cmd/dlqtool/
        linters:
          - forbidigo

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
